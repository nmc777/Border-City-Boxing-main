openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: BorderCityBoxing API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: classes
    description: Boxing class operations
  - name: bookings
    description: Booking operations
  - name: coaches
    description: Coach management and class sign-ins
  - name: admin
    description: Admin dashboard and management
  - name: members
    description: Membership status
  - name: attendance
    description: Member class check-in and attendance tracking
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          description: Relative path to redirect to after login (must start with `/`). Defaults to `/`.
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect to the returnTo path on success or /api/login on failure.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'
  /classes:
    get:
      operationId: listClasses
      tags: [classes]
      summary: List all classes
      responses:
        "200":
          description: List of classes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BoxingClass"
  /bookings:
    get:
      operationId: listMyBookings
      tags: [bookings]
      summary: Get the current user's bookings
      parameters:
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        "200":
          description: List of bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BookingWithClass"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    post:
      operationId: createBooking
      tags: [bookings]
      summary: Book a class
      parameters:
        - $ref: '#/components/parameters/SessionCookie'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookingRequest"
      responses:
        "201":
          description: Booking created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Already booked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /coaches/status:
    get:
      operationId: getCoachStatus
      tags: [coaches]
      summary: Check if the current user is a coach
      parameters:
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        "200":
          description: Coach status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoachStatus"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /coaches/register:
    post:
      operationId: registerAsCoach
      tags: [coaches]
      summary: Register as a coach using a coach code
      parameters:
        - $ref: '#/components/parameters/SessionCookie'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CoachRegisterRequest"
      responses:
        "201":
          description: Registered as coach
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoachStatus"
        "400":
          description: Invalid code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /classes/{classId}/coach-signin:
    post:
      operationId: coachSignInToClass
      tags: [coaches]
      summary: Coach signs in to a class
      parameters:
        - $ref: '#/components/parameters/SessionCookie'
        - name: classId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Coach signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoachSignin"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Not a coach
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Already signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    delete:
      operationId: coachSignOutFromClass
      tags: [coaches]
      summary: Coach signs out from a class
      parameters:
        - $ref: '#/components/parameters/SessionCookie'
        - name: classId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Signed out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutSuccess"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Not a coach
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /classes/{classId}/roster:
    get:
      operationId: getClassRoster
      tags: [coaches]
      summary: Get the roster for a class (coaches only)
      parameters:
        - $ref: '#/components/parameters/SessionCookie'
        - name: classId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Class roster
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassRoster"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Not a coach
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /bookings/{bookingId}:
    delete:
      operationId: cancelBooking
      tags: [bookings]
      summary: Cancel a booking
      parameters:
        - $ref: '#/components/parameters/SessionCookie'
        - name: bookingId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Booking cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutSuccess"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Booking not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /members/status:
    get:
      operationId: getMemberStatus
      tags: [members]
      summary: Check if the current user is a member
      parameters:
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        "200":
          description: Member status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberStatus"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /admin/status:
    get:
      operationId: getAdminStatus
      tags: [admin]
      summary: Check if the current user is an admin
      parameters:
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        "200":
          description: Admin status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStatus"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /admin/register:
    post:
      operationId: registerAsAdmin
      tags: [admin]
      summary: Register as an admin using an admin code
      parameters:
        - $ref: '#/components/parameters/SessionCookie'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminRegisterRequest"
      responses:
        "201":
          description: Registered as admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStatus"
        "400":
          description: Invalid code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      summary: List all users with their roles (admin only)
      parameters:
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        "200":
          description: All users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /admin/users/{userId}/membership:
    patch:
      operationId: adminToggleMembership
      tags: [admin]
      summary: Grant or revoke membership for a user
      parameters:
        - $ref: '#/components/parameters/SessionCookie'
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToggleRoleRequest"
      responses:
        "200":
          description: Membership updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /admin/users/{userId}/coach:
    patch:
      operationId: adminToggleCoach
      tags: [admin]
      summary: Grant or revoke coach role for a user
      parameters:
        - $ref: '#/components/parameters/SessionCookie'
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToggleRoleRequest"
      responses:
        "200":
          description: Coach role updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /admin/classes:
    get:
      operationId: adminListClasses
      tags: [admin]
      summary: List all classes with enrollment stats (admin only)
      parameters:
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        "200":
          description: All classes with stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminClassStats"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    post:
      operationId: adminCreateClass
      tags: [admin]
      summary: Create a new class
      parameters:
        - $ref: '#/components/parameters/SessionCookie'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClassRequest"
      responses:
        "201":
          description: Class created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminClassStats"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /admin/classes/{classId}:
    delete:
      operationId: adminDeleteClass
      tags: [admin]
      summary: Delete a class
      parameters:
        - $ref: '#/components/parameters/SessionCookie'
        - name: classId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Class deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutSuccess"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /admin/overview:
    get:
      operationId: adminGetOverview
      tags: [admin]
      summary: Get dashboard stats overview
      parameters:
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        "200":
          description: Dashboard overview stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminOverview"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /attendance/checkin:
    post:
      operationId: checkInToClass
      tags: [attendance]
      summary: Check in to a booked class
      parameters:
        - $ref: '#/components/parameters/SessionCookie'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckInRequest"
      responses:
        "201":
          description: Checked in successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckInResponse"
        "400":
          description: No active booking for this class
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Already checked in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /attendance/my:
    get:
      operationId: getMyCheckIns
      tags: [attendance]
      summary: Get all classes the current user has checked into
      parameters:
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        "200":
          description: List of check-ins
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyCheckInsResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
    BoxingClass:
      type: object
      required: [id, name, category, instructor, description, schedule, duration, capacity, spotsRemaining, location]
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: string
          enum: [kids, recreation, rock_steady]
        instructor:
          type: string
        description:
          type: string
        schedule:
          type: string
        duration:
          type: integer
          description: Duration in minutes
        capacity:
          type: integer
        spotsRemaining:
          type: integer
        location:
          type: string
    Booking:
      type: object
      required: [id, classId, userId, bookedAt, status]
      properties:
        id:
          type: integer
        classId:
          type: integer
        userId:
          type: string
        bookedAt:
          type: string
          format: date-time
        status:
          type: string
          enum: [active, cancelled]
    BookingWithClass:
      type: object
      required: [id, classId, userId, bookedAt, status, class]
      properties:
        id:
          type: integer
        classId:
          type: integer
        userId:
          type: string
        bookedAt:
          type: string
          format: date-time
        status:
          type: string
          enum: [active, cancelled]
        class:
          $ref: "#/components/schemas/BoxingClass"
    CreateBookingRequest:
      type: object
      required: [classId]
      properties:
        classId:
          type: integer
    MemberStatus:
      type: object
      required: [isMember]
      properties:
        isMember:
          type: boolean
    AdminStatus:
      type: object
      required: [isAdmin]
      properties:
        isAdmin:
          type: boolean
    AdminRegisterRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
    ToggleRoleRequest:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean
    AdminUser:
      type: object
      required: [id, firstName, lastName, email, isCoach, isMember, isAdmin, createdAt]
      properties:
        id:
          type: string
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        email:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
        isCoach:
          type: boolean
        isMember:
          type: boolean
        isAdmin:
          type: boolean
        createdAt:
          type: string
          format: date-time
    AdminClassStats:
      type: object
      required: [id, name, category, instructor, description, schedule, duration, capacity, location, enrollmentCount, coachesSignedIn]
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: string
          enum: [kids, recreation, rock_steady]
        instructor:
          type: string
        description:
          type: string
        schedule:
          type: string
        duration:
          type: integer
        capacity:
          type: integer
        location:
          type: string
        enrollmentCount:
          type: integer
        coachesSignedIn:
          type: array
          items:
            type: string
    CreateClassRequest:
      type: object
      required: [name, category, instructor, description, schedule, duration, capacity]
      properties:
        name:
          type: string
        category:
          type: string
          enum: [kids, recreation, rock_steady]
        instructor:
          type: string
        description:
          type: string
        schedule:
          type: string
        duration:
          type: integer
        capacity:
          type: integer
        location:
          type: string
    AdminOverview:
      type: object
      required: [totalMembers, totalCoaches, totalAdmins, totalClasses, totalActiveBookings]
      properties:
        totalMembers:
          type: integer
        totalCoaches:
          type: integer
        totalAdmins:
          type: integer
        totalClasses:
          type: integer
        totalActiveBookings:
          type: integer
    CoachStatus:
      type: object
      required: [isCoach]
      properties:
        isCoach:
          type: boolean
    CoachRegisterRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
    CoachSignin:
      type: object
      required: [id, classId, userId, signinAt]
      properties:
        id:
          type: integer
        classId:
          type: integer
        userId:
          type: string
        signinAt:
          type: string
          format: date-time
    RosterMember:
