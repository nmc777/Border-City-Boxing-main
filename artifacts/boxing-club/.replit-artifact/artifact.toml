kind = "web"
previewPath = "/"
title = "BorderCityBoxing"
version = "1.0.0"
id = "artifacts/boxing-club"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25736

[services.development]
run = "pnpm --filter @workspace/boxing-club run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/boxing-club", "run", "build" ]
publicDir = "artifacts/boxing-club/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25736"
BASE_PATH = "/"
