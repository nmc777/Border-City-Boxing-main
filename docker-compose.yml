services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: boxing
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: boxing_club
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boxing -d boxing_club"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      target: migrate
    environment:
      DATABASE_URL: postgresql://boxing:${DB_PASSWORD:-changeme}@db:5432/boxing_club
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    environment:
      DATABASE_URL: postgresql://boxing:${DB_PASSWORD:-changeme}@db:5432/boxing_club
      NODE_ENV: production
      PORT: 3000
      APP_URL: ${APP_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      ADMIN_CODE: ${ADMIN_CODE:-BCB-ADMIN-2024}
      COACH_CODE: ${COACH_CODE:-BCB-COACH-2024}
      # Square
      SQUARE_ACCESS_TOKEN: ${SQUARE_ACCESS_TOKEN}
      SQUARE_APPLICATION_ID: ${SQUARE_APPLICATION_ID}
      SQUARE_ENVIRONMENT: ${SQUARE_ENVIRONMENT:-sandbox}
      SQUARE_WEBHOOK_SIGNATURE_KEY: ${SQUARE_WEBHOOK_SIGNATURE_KEY}
      SQUARE_WEBHOOK_NOTIFICATION_URL: ${SQUARE_WEBHOOK_NOTIFICATION_URL}
      # AWS SES (transactional email)
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
      # Mailchimp
      MAILCHIMP_API_KEY: ${MAILCHIMP_API_KEY}
      MAILCHIMP_AUDIENCE_ID: ${MAILCHIMP_AUDIENCE_ID}
      MAILCHIMP_SERVER_PREFIX: ${MAILCHIMP_SERVER_PREFIX}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
